# Docker Compose profile gateway：统一入口，将 /api/v1/auth/* 转发至 masp-auth，其余至 masp（core）
upstream masp_core {
    server masp:8765;
    keepalive 16;
}

upstream masp_auth {
    server masp-auth:8766;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    location /api/v1/auth/ {
        proxy_pass http://masp_auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://masp_core;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
